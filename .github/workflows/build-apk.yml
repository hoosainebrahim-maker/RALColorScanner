name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"

      - name: Locate project root and build debug APK
        run: |
          PROJECT_DIR=$(dirname "$(find . -name settings.gradle.kts -not -path '*/build/*' | head -n 1)")
          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            PROJECT_DIR="."
          fi
          echo "Found Gradle project at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAL-Color-Scanner-debug-apk
          path: "**/app-debug.apk"
